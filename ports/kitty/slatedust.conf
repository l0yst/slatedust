# ================================================================
#  kitty.conf — full config
#  theme: SlateDust (https://github.com/l0yst/slatedust)
# ================================================================
 
# ── Font ─────────────────────────────────────────────────────────
font_family        JetBrains Mono
bold_font          JetBrains Mono Bold
italic_font        JetBrains Mono Italic
bold_italic_font   JetBrains Mono Bold Italic
font_size          11.0 

# ── Backgrounds ─────────────────────────────────────────────────
background              #1c2023
selection_background    #2e3438
 
# ── Foregrounds ─────────────────────────────────────────────────
foreground              #c0c8cf
selection_foreground    #dde2e6
 
# ── URL ─────────────────────────────────────────────────────────
url_color               #8fc2ad
 
# ── Tab bar ─────────────────────────────────────────────────────
active_tab_foreground   #1c2023
active_tab_background   #8bafc4
inactive_tab_foreground #505a61
inactive_tab_background #1c2023
tab_bar_background      #1c2023

tab_bar_edge              bottom
tab_bar_style             powerline
tab_powerline_style       round
tab_title_template        " {index}: {title} ({tab_dir}) "
active_tab_font_style     bold
inactive_tab_font_style   normal
 
# ── Borders ─────────────────────────────────────────────────────
active_border_color     #8bafc4
inactive_border_color   #3a4044
 
# ── Normal colors ─────────────────────────────────────────
color0    #1c2023
color1    #c49494
color2    #a8c292
color3    #c2bf88
color4    #8bafc4
color5    #a699c4
color6    #8fc2ad
color7    #c0c8cf
 
# ── Bright colors ────────────────────────────────────────
color8    #3a4044
color9    #c49494
color10   #a8c292
color11   #c2bf88
color12   #8bafc4
color13   #c294b2
color14   #8fc2ad
color15   #dde2e6
 
# ── Cursor ───────────────────────────────────────────────────────
cursor                  #8bafc4
cursor_text_color       #1c2023
cursor_shape            block
cursor_blink_interval   0
 
# ── Scrollback ───────────────────────────────────────────────────
scrollback_lines      5000
 
# ── Mouse ────────────────────────────────────────────────────────
mouse_hide_wait       3.0
url_style             curly
open_url_with         default
detect_urls           yes
 
# ── Window ───────────────────────────────────────────────────────
window_padding_width        10
window_border_width         1px
draw_minimal_borders        yes
hide_window_decorations     no
resize_in_steps             yes
confirm_os_window_close     0
 
# ── Keybindings ──────────────────────────────────────────────────
map ctrl+shift+c    copy_to_clipboard
map ctrl+shift+v    paste_from_clipboard
 
map ctrl+shift+t    new_tab
map ctrl+shift+w    close_tab
map ctrl+shift+]    next_tab
map ctrl+shift+[    previous_tab
 
map ctrl+shift+n    new_window
map ctrl+shift+enter new_window
 
map ctrl+equal      change_font_size all +1.0
map ctrl+minus      change_font_size all -1.0
map ctrl+shift+0    change_font_size all 0

